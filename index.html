<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人原創貼圖 - 媽祖保佑你</title>
    
    <!-- 資源載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 隱藏 Weebly 預設元素 */
        #header-wrap, #nav-wrap, .weebly-header, header.weebly-header, .header-wrap, .mobile-nav-trigger, .hamburger, .w-nav, #mobile-nav {
            display: none !important;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            margin: 0 !important;
            padding: 0 !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        #root { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        ::-webkit-scrollbar { display: none; }

        /* 預覽視窗動畫 */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-zoom-in {
            animation: zoomIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // === 在這裡修改連結 / EDIT LINKS HERE ===
        // ==========================================
        const LINKS = {
            GIFT_URL: "https://goodgifttosend.cc/X6IG7",      // 贈送禮物
            DOWNLOAD_URL: "https://goodgifttosend.cc/X6IG7",  // 下載
            HEART_URL: "https://goodgifttosend.cc/X6IG7",     // 愛心按鈕
            AUTHOR_URL: "https://store.line.me/stickershop/author/96556/zh-Hant" // 作者名
        };
        // ==========================================

        const START_ID = 139363278;
        const stickerIds = Array.from({ length: 40 }, (_, i) => (START_ID + i).toString());

        const MAZU_DATA = {
            name: "媽祖保佑你-新年與節日的祝福",
            author: "Amy",
            mainImageUrl: "https://stickershop.line-scdn.net/stickershop/v1/product/6237463/LINEStorePC/main.png?v=1",
            stickers: stickerIds.map(id => ({
                id,
                url: `https://stickershop.line-scdn.net/stickershop/v1/sticker/${id}/android/sticker.png?v=1`
            }))
        };

        const App = () => {
            const [selectedSticker, setSelectedSticker] = useState(null);
            const [downloadCount, setDownloadCount] = useState(146756);

            // 點選貼圖後 1 秒自動關閉預覽
            useEffect(() => {
                if (selectedSticker) {
                    const timer = setTimeout(() => {
                        setSelectedSticker(null);
                    }, 1000);
                    return () => clearTimeout(timer);
                }
            }, [selectedSticker]);

            // 模擬下載人數快速增加
            useEffect(() => {
                const interval = setInterval(() => {
                    setDownloadCount(prev => prev + Math.floor(Math.random() * 12) + 5);
                }, 800);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header: 移除兩側圖示，文字居中 */}
                    <header className="bg-[#333333] h-[56px] flex items-center justify-center px-3 sticky top-0 z-[100]">
                        <h2 className="text-white text-[17px] font-bold tracking-wider">個人原創貼圖</h2>
                    </header>
                    
                    {/* 主視覺區塊 */}
                    <section className="bg-white px-4 pt-6 pb-2">
                        <div className="flex gap-4 mb-5">
                            <div className="w-[120px] h-[120px] flex-shrink-0 relative">
                                <div className="w-full h-full bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm flex items-center justify-center p-2">
                                    <img src={MAZU_DATA.mainImageUrl} className="w-full h-full object-contain" referrerPolicy="no-referrer" />
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col pt-1">
                                <h1 className="text-[17px] font-bold text-[#111111] leading-tight mb-1">{MAZU_DATA.name}</h1>
                                <a href={LINKS.AUTHOR_URL} target="_blank" className="text-[13px] text-[#555555] underline decoration-gray-300 underline-offset-2 mb-1 w-fit">{MAZU_DATA.author}</a>
                                
                                {/* 下載人數顯示 */}
                                <div className="flex items-center gap-1 mb-3">
                                    <span className="text-[11px] text-gray-400">目前下載人數：</span>
                                    <span className="text-[12px] font-bold text-[#555555]">{downloadCount.toLocaleString()}</span>
                                </div>

                                <div className="mt-auto flex items-center justify-between">
                                    <span className="text-[18px] font-bold text-[#00c300]">NT$0</span>
                                    {/* 愛心跳轉連結 */}
                                    <a href={LINKS.HEART_URL} target="_blank" className="w-10 h-10 bg-[#f4f4f4] rounded-full flex items-center justify-center text-gray-400 active:scale-90 transition-transform">
                                        <i className="fa-regular fa-heart text-lg"></i>
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2 mb-4">
                            <a href={LINKS.GIFT_URL} target="_blank" className="flex-1 h-[48px] bg-[#7b8191] rounded-md flex items-center justify-center font-bold text-white text-[15px]">贈送禮物</a>
                            <a href={LINKS.DOWNLOAD_URL} target="_blank" className="flex-1 h-[48px] bg-[#59d261] rounded-md flex items-center justify-center font-bold text-white text-[15px]">下載</a>
                        </div>

                        {/* 引導文字靠左對齊 */}
                        <div className="text-left py-4 -ml-3">
                            <p className="text-[13px] text-gray-400 font-medium">點選貼圖即可預覽</p>
                        </div>
                    </section>

                    {/* 下方貼圖區塊 */}
                    <div className="grid grid-cols-4 gap-[1px] bg-[#f2f2f2] w-full">
                        {MAZU_DATA.stickers.map((sticker) => (
                            <div 
                                key={sticker.id} 
                                className="bg-white aspect-square flex items-center justify-center p-[10%] cursor-pointer hover:bg-gray-50 transition-colors" 
                                onClick={() => setSelectedSticker(sticker)}
                            >
                                <img src={sticker.url} loading="lazy" className="max-w-full max-h-full object-contain" referrerPolicy="no-referrer" />
                            </div>
                        ))}
                    </div>

                    <footer className="mt-12 mb-12 text-center">
                        <span className="text-[12px] text-gray-400">©Amy</span>
                    </footer>

                    {/* 預覽視窗 */}
                    {selectedSticker && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md" onClick={() => setSelectedSticker(null)}>
                            <div className="relative bg-white/10 p-8 rounded-[3rem] border border-white/20 shadow-2xl animate-zoom-in">
                                <img src={selectedSticker.url} className="w-56 h-56 object-contain" referrerPolicy="no-referrer" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
