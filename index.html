<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Sticker Shop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #FF6B6B; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .sticker { display: inline-block; margin: 10px; text-align: center; }
        img { max-width: 100px; }
        footer { text-align: center; padding: 10px; background: #FFC107; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the LINE Sticker Shop</h1>
    </header>
    <div class="container">
        <h2>Featured Stickers</h2>
        <div class="sticker">
            <img src="sticker1.png" alt="Sticker 1">
            <p>Sticker 1</p>
        </div>
        <div class="sticker">
            <img src="sticker2.png" alt="Sticker 2">
            <p>Sticker 2</p>
        </div>
        <div class="sticker">
            <img src="sticker3.png" alt="Sticker 3">
            <p>Sticker 3</p>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 LINE Corporation</p>
    </footer>
</body>
</html>
